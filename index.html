<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jboll3 Character Card Collection</title>
  <style>
    :root{color-scheme:dark;--bg:#090b10;--panel:#121722;--panel2:#181f2d;--line:#2b3446;--text:#f5f7fb;--muted:#9aa6ba;--accent:#70a7ff;--green:#62d895;--yellow:#f5c451;--red:#ff7a86;--card-width:265px}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0d1220 0,#090b10 360px);color:var(--text);font:15px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif} button,input,select,textarea{font:inherit} a{color:#8db8ff}.top{position:sticky;top:0;z-index:20;padding:18px clamp(14px,3vw,38px);background:rgba(9,11,16,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    h1{font-size:clamp(23px,3vw,38px);margin:0 0 4px}.sub{color:var(--muted);margin:0 0 15px}.toolbar{display:grid;grid-template-columns:minmax(200px,1.5fr) repeat(3,minmax(145px,.6fr));gap:10px}.toolbar input,.toolbar select,.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:#0e131d;color:var(--text);border-radius:9px;padding:9px 10px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:8px 11px;border-radius:9px;cursor:pointer}.btn:hover{border-color:var(--accent)}.summary{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;color:var(--muted)}.pill{background:#111825;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.pill b{color:var(--text)}
    main{padding:24px clamp(12px,2.5vw,34px) 60px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,var(--card-width)),1fr));gap:19px;align-items:start}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.22)}.card.owned{border-color:rgba(98,216,149,.65)}.card.bidding{box-shadow:0 0 0 2px rgba(245,196,81,.55),0 10px 28px rgba(0,0,0,.22)}
    .image-shell{width:100%;aspect-ratio:5/7;background:#05070b;display:flex;align-items:center;justify-content:center;cursor:zoom-in;border-bottom:1px solid var(--line)}.image-shell img{display:block;width:100%;height:100%;object-fit:contain;object-position:center}.image-shell img.failed{display:none}.no-image{display:none;color:var(--muted);padding:20px;text-align:center}.image-shell.noimg .no-image{display:block}.body{padding:13px}.title{font-size:17px;font-weight:760;line-height:1.2;margin:0 0 5px}.meta{color:var(--muted);font-size:13px;min-height:37px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.tag{font-size:12px;padding:3px 7px;border:1px solid var(--line);border-radius:999px;background:#0e131d}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.check{display:flex;align-items:center;gap:8px;padding:9px;border:1px solid var(--line);border-radius:9px;background:#0e131d;font-weight:650}.check input{width:18px;height:18px;accent-color:var(--accent)}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 4px}.gain{margin-top:9px;padding:8px 10px;border-radius:9px;background:#0e131d;border:1px solid var(--line);font-weight:720}.gain.pos{color:var(--green)}.gain.neg{color:var(--red)}details{margin-top:10px;border-top:1px solid var(--line);padding-top:9px}summary{cursor:pointer;color:var(--muted)}details .field{margin-top:9px}.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:13px}.empty{padding:70px 20px;text-align:center;color:var(--muted)}
    dialog{border:1px solid var(--line);border-radius:14px;background:#080b11;padding:10px;max-width:min(94vw,720px);max-height:94vh}dialog::backdrop{background:rgba(0,0,0,.85)}dialog img{display:block;max-width:100%;max-height:88vh;object-fit:contain}.close{position:fixed;right:20px;top:15px;font-size:28px;background:#111827;border:1px solid var(--line);color:white;border-radius:50%;width:44px;height:44px;cursor:pointer}
    .size-control{display:flex;align-items:center;gap:8px;color:var(--muted)}.size-control input{width:150px}.notice{margin:0 0 18px;padding:10px 13px;border:1px solid #35415a;background:#111827;border-radius:10px;color:#c8d3e6}
    @media(max-width:820px){.toolbar{grid-template-columns:1fr 1fr}.toolbar .search{grid-column:1/-1}.top{position:static}.edit-grid{grid-template-columns:1fr}.cards{--card-width:220px}}
    @media(max-width:480px){.toolbar{grid-template-columns:1fr}.toolbar .search{grid-column:auto}.cards{grid-template-columns:1fr}.card{max-width:390px;margin:auto;width:100%}}
  </style>
</head>
<body>
<header class="top">
  <h1>Character Card Collection</h1>
  <p class="sub">The card picture is the index. Everything else is bookkeeping.</p>
  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="Search card, set, number, or variant">
    <select id="character"><option value="">All characters</option></select>
    <select id="status"><option value="">All cards</option><option value="missing">Missing</option><option value="owned">Owned</option><option value="bidding">Currently bidding</option></select>
    <select id="sort"><option value="character">Character / set</option><option value="price-desc">Raw price high to low</option><option value="price-asc">Raw price low to high</option><option value="name">Card name</option></select>
  </div>
  <div class="actions">
    <button class="btn" id="exportBtn">Export backup</button><button class="btn" id="importBtn">Import backup</button><input id="importFile" type="file" accept="application/json" hidden>
    <button class="btn" id="clearBtn">Clear my tracking data</button>
    <label class="size-control">Card size <input id="size" type="range" min="210" max="380" value="265"></label>
  </div>
  <div class="summary" id="summary"></div>
</header>
<main>
  <p class="notice">Changes save automatically in this browser. Export a backup before clearing browser data or moving to another device.</p>
  <section class="cards" id="cards"></section>
  <div class="empty" id="empty" hidden>No cards match those filters.</div>
</main>
<dialog id="viewer"><button class="close" aria-label="Close">×</button><img alt="Full card image"></dialog>
<script src="data.js"></script>
<script src="image-resolver.js"></script>
<script>
(() => {
  const DATA = window.CARD_DATA || [];
  const KEY = 'jboll3-character-card-tracker-v1';
  const $ = id => document.getElementById(id);
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { saved = {}; }
  const money = n => n === '' || n == null || Number.isNaN(Number(n)) ? '' : new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(n));
  const esc = s => String(s ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const characters = [...new Set(DATA.map(x=>x.character))].sort();
  $('character').innerHTML += characters.map(x=>`<option>${esc(x)}</option>`).join('');
  function state(card){ return {...{owned:false,bidding:false,grade:'',cert:'',paid:'',current:'',dateBought:'',priceChecked:'',notes:''},...(saved[card.id]||{})}; }
  function save(card, patch){ saved[card.id] = {...state(card),...patch}; localStorage.setItem(KEY,JSON.stringify(saved)); renderSummary(); }
  function visible(){
    const q=$('search').value.trim().toLowerCase(), ch=$('character').value, st=$('status').value;
    let rows=DATA.filter(c=>{const s=state(c);const hay=[c.name,c.character,c.set,c.number,c.variant].join(' ').toLowerCase();return (!q||hay.includes(q))&&(!ch||c.character===ch)&&(!st||(st==='owned'&&s.owned)||(st==='missing'&&!s.owned)||(st==='bidding'&&s.bidding));});
    const sort=$('sort').value;
    rows.sort((a,b)=>sort==='price-desc'?(b.raw||0)-(a.raw||0):sort==='price-asc'?(a.raw||0)-(b.raw||0):sort==='name'?a.name.localeCompare(b.name):a.character.localeCompare(b.character)||a.set.localeCompare(b.set)||a.name.localeCompare(b.name));
    return rows;
  }
  function renderSummary(){
    const all=DATA.map(c=>state(c)); const owned=all.filter(x=>x.owned).length,bidding=all.filter(x=>x.bidding).length; const paid=all.reduce((n,x)=>n+(Number(x.paid)||0),0),value=all.reduce((n,x)=>n+(Number(x.current)||0),0);
    $('summary').innerHTML=`<span class="pill"><b>${DATA.length}</b> cards</span><span class="pill"><b>${owned}</b> owned</span><span class="pill"><b>${bidding}</b> bidding</span><span class="pill"><b>${Math.round(owned/DATA.length*100)||0}%</b> complete</span><span class="pill">Paid <b>${money(paid)}</b></span><span class="pill">Current <b>${money(value)}</b></span><span class="pill">Gain/loss <b>${money(value-paid)}</b></span>`;
  }
  function render(){
    const rows=visible(); $('empty').hidden=!!rows.length;
    $('cards').innerHTML=rows.map(c=>{const s=state(c),gain=(Number(s.current)||0)-(Number(s.paid)||0);return `<article class="card ${s.owned?'owned':''} ${s.bidding?'bidding':''}" data-id="${esc(c.id)}">
      <div class="image-shell ${c.image?'':'noimg'}" data-view="${esc(c.image)}"><img loading="lazy" src="${esc(c.image)}" alt="${esc(c.name)}" onerror="this.classList.add('failed');this.parentElement.classList.add('noimg')"><div class="no-image">Image not yet confirmed<br>${esc(c.name)}</div></div>
      <div class="body"><h2 class="title">${esc(c.name)}</h2><div class="meta">${esc(c.set)}${c.number?` · <b>${esc(c.number)}</b>`:''}</div><div class="tags"><span class="tag">${esc(c.character)}</span>${c.variant?`<span class="tag">${esc(c.variant)}</span>`:''}${c.raw!=null?`<span class="tag">Raw ${money(c.raw)}</span>`:''}</div>
      <div class="checks"><label class="check"><input type="checkbox" data-field="owned" ${s.owned?'checked':''}> Owned</label><label class="check"><input type="checkbox" data-field="bidding" ${s.bidding?'checked':''}> Bidding</label></div>
      <div class="edit-grid"><div class="field"><label>Grade</label><select data-field="grade"><option></option>${['PSA 10','PSA 9','PSA 8','PSA 7','PSA 6','PSA 5 or lower','Other','Raw'].map(x=>`<option ${s.grade===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Certification #</label><input data-field="cert" value="${esc(s.cert)}"></div><div class="field"><label>What I paid</label><input data-field="paid" type="number" min="0" step="0.01" value="${esc(s.paid)}"></div><div class="field"><label>Current price</label><input data-field="current" type="number" min="0" step="0.01" value="${esc(s.current)}"></div></div>
      <div class="gain ${gain>0?'pos':gain<0?'neg':''}">Gain / loss: ${money(gain)}</div>
      <details><summary>Dates, notes, and links</summary><div class="edit-grid"><div class="field"><label>Date bought</label><input data-field="dateBought" type="date" value="${esc(s.dateBought)}"></div><div class="field"><label>Price checked</label><input data-field="priceChecked" type="date" value="${esc(s.priceChecked)}"></div></div><div class="field"><label>Notes</label><textarea data-field="notes" rows="3">${esc(s.notes)}</textarea></div><div class="links">${c.source?`<a href="${esc(c.source)}" target="_blank" rel="noopener">Card/source page</a>`:''}${c.image?`<a href="${esc(c.image)}" target="_blank" rel="noopener">Open image</a>`:''}</div></details></div></article>`}).join('');
  }
  $('cards').addEventListener('change',e=>{const field=e.target.dataset.field;if(!field)return;const el=e.target.closest('.card'),card=DATA.find(x=>x.id===el.dataset.id);save(card,{[field]:e.target.type==='checkbox'?e.target.checked:e.target.value});render();});
  $('cards').addEventListener('input',e=>{const field=e.target.dataset.field;if(!field||['paid','current','cert','notes'].indexOf(field)<0)return;const el=e.target.closest('.card'),card=DATA.find(x=>x.id===el.dataset.id);save(card,{[field]:e.target.value});const paid=Number(el.querySelector('[data-field=paid]').value)||0,current=Number(el.querySelector('[data-field=current]').value)||0,g=current-paid,box=el.querySelector('.gain');box.textContent='Gain / loss: '+money(g);box.className='gain '+(g>0?'pos':g<0?'neg':'');});
  $('cards').addEventListener('click',e=>{const shell=e.target.closest('[data-view]');if(!shell||!shell.dataset.view)return;const d=$('viewer');d.querySelector('img').src=shell.dataset.view;d.showModal();});
  $('viewer').querySelector('.close').onclick=()=>$('viewer').close(); $('viewer').onclick=e=>{if(e.target===$('viewer'))$('viewer').close();};
  ['search','character','status','sort'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',render));
  $('size').oninput=e=>document.documentElement.style.setProperty('--card-width',e.target.value+'px');
  $('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),tracking:saved},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jboll3-card-collection-backup.json';a.click();URL.revokeObjectURL(a.href);};
  $('importBtn').onclick=()=>$('importFile').click(); $('importFile').onchange=async e=>{try{const obj=JSON.parse(await e.target.files[0].text());saved=obj.tracking||obj;localStorage.setItem(KEY,JSON.stringify(saved));render();renderSummary();}catch{alert('That file is not a valid tracker backup.');}e.target.value='';};
  $('clearBtn').onclick=()=>{if(confirm('Clear all Owned, Bidding, grade, and price entries saved in this browser?')){saved={};localStorage.removeItem(KEY);render();renderSummary();}};
  render();renderSummary();
})();
</script>
</body>
</html>
